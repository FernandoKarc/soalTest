<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ujian SME CRR – BCA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B1F3A;
    --navy2: #132d54;
    --blue: #1A56DB;
    --blue-light: #3B82F6;
    --gold: #D4A017;
    --gold-light: #F5C842;
    --cream: #FAF7F2;
    --white: #FFFFFF;
    --gray: #64748B;
    --gray-light: #E8EDF4;
    --green: #059669;
    --red: #DC2626;
    --correct: #D1FAE5;
    --wrong: #FEE2E2;
    --shadow: 0 4px 24px rgba(11,31,58,0.12);
    --shadow-lg: 0 12px 48px rgba(11,31,58,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--navy);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    width: 36px; height: 36px;
    background: var(--gold);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 18px;
    color: var(--navy);
    flex-shrink: 0;
  }
  .header-title {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--white);
    line-height: 1.3;
  }
  .header-title span {
    display: block;
    font-weight: 300;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .progress-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    white-space: nowrap;
  }
  .progress-bar-outer {
    width: 120px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: var(--gold);
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── HERO / START SCREEN ── */
  #start-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--navy);
    position: relative;
    overflow: hidden;
  }
  #start-screen::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(26,86,219,0.2) 0%, transparent 70%);
    top: -100px; right: -100px;
    pointer-events: none;
  }
  #start-screen::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(212,160,23,0.1) 0%, transparent 70%);
    bottom: -50px; left: -50px;
    pointer-events: none;
  }
  .start-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 56px 48px;
    max-width: 560px;
    width: 90%;
    text-align: center;
    position: relative;
    z-index: 1;
    backdrop-filter: blur(12px);
  }
  .start-badge {
    display: inline-block;
    background: rgba(212,160,23,0.15);
    border: 1px solid rgba(212,160,23,0.3);
    color: var(--gold-light);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 99px;
    margin-bottom: 24px;
  }
  .start-title {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 900;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .start-title span { color: var(--gold); }
  .start-subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 36px;
    line-height: 1.6;
  }
  .start-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 36px;
  }
  .start-stat {
    background: rgba(255,255,255,0.04);
    padding: 16px 12px;
    text-align: center;
  }
  .start-stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    color: var(--gold);
    display: block;
  }
  .start-stat-label {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }
  .btn-start {
    background: var(--gold);
    color: var(--navy);
    border: none;
    padding: 16px 48px;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    width: 100%;
  }
  .btn-start:hover {
    background: var(--gold-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(212,160,23,0.35);
  }
  .btn-start:active { transform: translateY(0); }

  /* ── QUIZ SCREEN ── */
  #quiz-screen { display: none; padding: 32px 24px 80px; }
  .quiz-inner { max-width: 780px; margin: 0 auto; }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 40px 0 20px;
  }
  .section-divider:first-child { margin-top: 0; }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue);
    white-space: nowrap;
    background: #EBF3FB;
    padding: 5px 14px;
    border-radius: 99px;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--gray-light);
  }

  .question-card {
    background: var(--white);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    border: 1.5px solid transparent;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .question-card:hover { box-shadow: var(--shadow-lg); }
  .question-card.answered { border-color: var(--gray-light); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 18px;
  }
  .q-number {
    background: var(--navy);
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 6px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .q-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.65;
    color: var(--navy);
  }

  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1.5px solid var(--gray-light);
    cursor: pointer;
    transition: all 0.15s;
    background: #FAFBFD;
  }
  .option:hover { border-color: var(--blue-light); background: #F0F6FF; }
  .option input[type="radio"] { display: none; }
  .option-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid #CBD5E1;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.15s;
    position: relative;
  }
  .option-dot::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    background: var(--blue);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0);
    transition: transform 0.15s;
  }
  .option.selected .option-dot {
    border-color: var(--blue);
    background: var(--blue);
  }
  .option.selected .option-dot::after {
    background: white;
    transform: translate(-50%,-50%) scale(1);
  }
  .option.selected {
    border-color: var(--blue);
    background: #EBF3FF;
  }
  .option-text {
    font-size: 14px;
    line-height: 1.5;
    color: #374151;
  }

  /* After submit – show correct/wrong */
  .option.correct {
    border-color: var(--green) !important;
    background: var(--correct) !important;
  }
  .option.correct .option-dot {
    border-color: var(--green);
    background: var(--green);
  }
  .option.wrong {
    border-color: var(--red) !important;
    background: var(--wrong) !important;
  }
  .option.wrong .option-dot {
    border-color: var(--red);
    background: var(--red);
  }
  .option.correct .option-dot::after,
  .option.wrong .option-dot::after {
    background: white;
    transform: translate(-50%,-50%) scale(1);
  }
  .option.disabled { cursor: not-allowed; pointer-events: none; }

  /* ── UNANSWERED warning ── */
  .question-card.unanswered-warn {
    border-color: #F59E0B !important;
    box-shadow: 0 0 0 3px rgba(245,158,11,0.15);
    animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }
  .warn-label {
    position: absolute;
    top: 12px; right: 14px;
    background: #FEF3C7;
    color: #92400E;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 99px;
    border: 1px solid #FCD34D;
  }

  /* ── SUBMIT BAR ── */
  .submit-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid var(--gray-light);
    padding: 16px 24px;
    display: none;
    z-index: 50;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.08);
  }
  .submit-bar-inner {
    max-width: 780px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .submit-info {
    font-size: 13px;
    color: var(--gray);
  }
  .submit-info strong {
    color: var(--navy);
    font-weight: 600;
  }
  .btn-submit {
    background: var(--navy);
    color: var(--white);
    border: none;
    padding: 13px 36px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-submit:hover {
    background: var(--navy2);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(11,31,58,0.25);
  }

  /* ── RESULT SCREEN ── */
  #result-screen { display: none; padding: 48px 24px; }
  .result-inner { max-width: 680px; margin: 0 auto; text-align: center; }

  .result-ring {
    width: 180px; height: 180px;
    margin: 0 auto 32px;
    position: relative;
  }
  .result-ring svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--gray-light); stroke-width: 12; }
  .ring-fg {
    fill: none;
    stroke-width: 12;
    stroke-linecap: round;
    stroke-dasharray: 502;
    stroke-dashoffset: 502;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
  }
  .ring-score {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
  }
  .ring-score-num {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--navy);
    line-height: 1;
    display: block;
  }
  .ring-score-label {
    font-size: 12px;
    color: var(--gray);
    font-weight: 500;
  }

  .result-grade {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .result-desc {
    font-size: 15px;
    color: var(--gray);
    margin-bottom: 36px;
    line-height: 1.6;
  }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 36px;
  }
  .result-stat {
    background: var(--white);
    border-radius: 14px;
    padding: 20px 16px;
    box-shadow: var(--shadow);
  }
  .result-stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    display: block;
    margin-bottom: 4px;
  }
  .result-stat-label {
    font-size: 12px;
    color: var(--gray);
    font-weight: 500;
  }
  .stat-correct .result-stat-num { color: var(--green); }
  .stat-wrong .result-stat-num { color: var(--red); }
  .stat-score .result-stat-num { color: var(--blue); }

  .result-table-wrap {
    background: var(--white);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 32px;
    text-align: left;
  }
  .result-table-title {
    padding: 16px 24px;
    background: var(--navy);
    color: var(--white);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .result-row {
    display: grid;
    grid-template-columns: 40px 1fr 100px;
    align-items: center;
    padding: 12px 24px;
    border-bottom: 1px solid var(--gray-light);
    gap: 12px;
  }
  .result-row:last-child { border-bottom: none; }
  .result-row-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--gray);
    font-weight: 500;
  }
  .result-row-q {
    font-size: 13px;
    color: var(--navy);
    line-height: 1.4;
  }
  .result-row-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 99px;
    text-align: center;
    white-space: nowrap;
  }
  .badge-correct { background: #D1FAE5; color: #065F46; }
  .badge-wrong { background: #FEE2E2; color: #991B1B; }

  .btn-retry {
    background: var(--navy);
    color: var(--white);
    border: none;
    padding: 16px 48px;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    max-width: 360px;
  }
  .btn-retry:hover {
    background: var(--navy2);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(11,31,58,0.25);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .start-card { padding: 36px 24px; }
    .start-title { font-size: 32px; }
    .question-card { padding: 20px 18px; }
    .result-grid { grid-template-columns: repeat(3,1fr); }
    .result-row { grid-template-columns: 32px 1fr 80px; padding: 10px 16px; }
    .header-inner { padding: 12px 16px; }
    .progress-bar-outer { width: 80px; }
  }

  /* Scroll reveal */
  .question-card {
    animation: fadeUp 0.35s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header id="main-header" style="display:none;">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-logo">B</div>
      <div class="header-title">
        Ujian SME CRR
        <span>Manual Kerja Versi 21 · 2025</span>
      </div>
    </div>
    <div class="progress-wrap">
      <span class="progress-text" id="prog-text">0 / 30</span>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="prog-bar"></div>
      </div>
    </div>
  </div>
</header>

<!-- START SCREEN -->
<div id="start-screen">
  <div class="start-card">
    <div class="start-badge">Bank Central Asia</div>
    <div class="start-title">Ujian SME<br><span>CRR</span> ICOS</div>
    <div class="start-subtitle">Tes pemahaman Manual Kerja SME ≤ Rp 15 M<br>Credit Risk Rating Versi 21 · Januari 2025</div>
    <div class="start-stats">
      <div class="start-stat">
        <span class="start-stat-num">30</span>
        <div class="start-stat-label">Soal</div>
      </div>
      <div class="start-stat">
        <span class="start-stat-num">8</span>
        <div class="start-stat-label">Bagian</div>
      </div>
      <div class="start-stat">
        <span class="start-stat-num">Advanced</span>
        <div class="start-stat-label">Level</div>
      </div>
    </div>
    <button class="btn-start" onclick="startQuiz()">Mulai Ujian →</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz-screen">
  <div class="quiz-inner" id="quiz-container"></div>
</div>

<!-- SUBMIT BAR -->
<div class="submit-bar" id="submit-bar">
  <div class="submit-bar-inner">
    <div class="submit-info">
      Terjawab: <strong id="answered-count">0</strong> dari <strong>30</strong> soal
    </div>
    <button class="btn-submit" onclick="submitQuiz()">Submit & Lihat Nilai →</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen">
  <div class="result-inner">
    <div class="result-ring">
      <svg width="180" height="180" viewBox="0 0 180 180">
        <circle class="ring-bg" cx="90" cy="90" r="80"/>
        <circle class="ring-fg" id="ring-fg" cx="90" cy="90" r="80"/>
      </svg>
      <div class="ring-score">
        <span class="ring-score-num" id="score-num">0</span>
        <span class="ring-score-label">/ 100</span>
      </div>
    </div>
    <div class="result-grade" id="result-grade">—</div>
    <div class="result-desc" id="result-desc">—</div>
    <div class="result-grid">
      <div class="result-stat stat-correct">
        <span class="result-stat-num" id="r-correct">0</span>
        <div class="result-stat-label">✓ Benar</div>
      </div>
      <div class="result-stat stat-wrong">
        <span class="result-stat-num" id="r-wrong">0</span>
        <div class="result-stat-label">✗ Salah</div>
      </div>
      <div class="result-stat stat-score">
        <span class="result-stat-num" id="r-pct">0%</span>
        <div class="result-stat-label">Akurasi</div>
      </div>
    </div>
    <div class="result-table-wrap">
      <div class="result-table-title">📋 Rincian Jawaban</div>
      <div id="result-rows"></div>
    </div>
    <button class="btn-retry" onclick="retryQuiz()">Ulangi Ujian</button>
  </div>
</div>

<script>
const SOAL = [
  // ── BAGIAN 1 ──
  {
    section: "Bagian 1 – Jenis Memo Kredit & Prosedur",
    no: 1,
    q: "PT ABADI JAYA saat ini memiliki fasilitas Kredit Lokal Rp 2 M yang akan jatuh tempo, sekaligus ingin menambah Time Loan baru Rp 1 M, dan juga ingin menukar agunan lama dengan agunan baru. Jenis Memo Kredit apa yang harus dipilih PIC Relationship?",
    opts: [
      "A. Perpanjangan, karena perpanjangan adalah permohonan utama",
      "B. Penambahan, karena penambahan risikonya lebih tinggi dari perpanjangan",
      "C. Penukaran, karena penukaran agunan adalah fokus permohonan",
      "D. Lain-lain, karena ada lebih dari satu jenis permohonan"
    ],
    ans: 1
  },
  {
    section: null,
    no: 2,
    q: "Debitur mengajukan permohonan kredit BARU dengan fasilitas revolving (jangka pendek). Tanggal memo sekarang 15 Februari 2025, jangka waktu kredit 1 tahun. Kapan batas MAKSIMAL jatuh tempo yang boleh diinput?",
    opts: [
      "A. 14 Februari 2026",
      "B. 15 Februari 2026",
      "C. 14 Juni 2026",
      "D. 15 Juni 2026"
    ],
    ans: 2
  },
  {
    section: null,
    no: 3,
    q: "Hasil scoring sistem menunjukkan 'Grey'. Siapa yang berhak memberikan KEPUTUSAN kredit?",
    opts: [
      "A. Senior Officer SME & UMKM Loan Processing (SUC) dan Kepala KCU saja",
      "B. Senior Credit Analyst / Credit Adviser dan Kepala KCU / Kakanwil",
      "C. PIC Relationship dan Head Relationship Officer",
      "D. Kakanwil saja tanpa persetujuan Credit Analyst"
    ],
    ans: 1
  },
  // ── BAGIAN 2 ──
  {

let userAnswers = new Array(SOAL.length).fill(null);
let submitted = false;

function startQuiz() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('submit-bar').style.display = 'block';
  document.getElementById('main-header').style.display = 'block';
  renderQuiz();
  updateProgress();
}

function renderQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  let currentSection = null;

  SOAL.forEach((s, idx) => {
    if (s.section && s.section !== currentSection) {
      currentSection = s.section;
      const div = document.createElement('div');
      div.className = 'section-divider';
      div.innerHTML = `<span class="section-label">${s.section}</span><div class="section-line"></div>`;
      container.appendChild(div);
    }

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${idx}`;
    card.style.animationDelay = `${(idx % 5) * 0.06}s`;

    const optsHtml = s.opts.map((o, oi) => `
      <label class="option" id="opt-${idx}-${oi}" onclick="selectAnswer(${idx}, ${oi})">
        <input type="radio" name="q${idx}" value="${oi}">
        <div class="option-dot"></div>
        <span class="option-text">${o}</span>
      </label>
    `).join('');

    card.innerHTML = `
      <div class="q-header">
        <span class="q-number">No.${s.no}</span>
        <span class="q-text">${s.q}</span>
      </div>
      <div class="options">${optsHtml}</div>
    `;
    container.appendChild(card);
  });
}

function selectAnswer(qIdx, optIdx) {
  if (submitted) return;
  userAnswers[qIdx] = optIdx;

  // Update visual
  SOAL[qIdx].opts.forEach((_, oi) => {
    const el = document.getElementById(`opt-${qIdx}-${oi}`);
    el.classList.toggle('selected', oi === optIdx);
  });

  // Remove warn
  const card = document.getElementById(`card-${qIdx}`);
  card.classList.remove('unanswered-warn');
  const warn = card.querySelector('.warn-label');
  if (warn) warn.remove();

  updateProgress();
}

function updateProgress() {
  const answered = userAnswers.filter(a => a !== null).length;
  document.getElementById('answered-count').textContent = answered;
  document.getElementById('prog-text').textContent = `${answered} / ${SOAL.length}`;
  document.getElementById('prog-bar').style.width = `${(answered / SOAL.length) * 100}%`;
}

function submitQuiz() {
  // Check unanswered
  const unanswered = userAnswers.map((a, i) => a === null ? i : null).filter(i => i !== null);
  if (unanswered.length > 0) {
    unanswered.forEach(idx => {
      const card = document.getElementById(`card-${idx}`);
      card.classList.add('unanswered-warn');
      if (!card.querySelector('.warn-label')) {
        const lbl = document.createElement('span');
        lbl.className = 'warn-label';
        lbl.textContent = '⚠ Belum dijawab';
        card.appendChild(lbl);
      }
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
    return;
  }

  submitted = true;

  // Show correct/wrong on options
  SOAL.forEach((s, idx) => {
    const correctIdx = s.ans;
    const userIdx = userAnswers[idx];
    s.opts.forEach((_, oi) => {
      const el = document.getElementById(`opt-${idx}-${oi}`);
      el.classList.add('disabled');
      if (oi === correctIdx) el.classList.add('correct');
      else if (oi === userIdx && userIdx !== correctIdx) el.classList.add('wrong');
      el.classList.remove('selected');
    });
  });

  // Calculate score
  const correct = userAnswers.filter((a, i) => a === SOAL[i].ans).length;
  const wrong = SOAL.length - correct;
  const pct = Math.round((correct / SOAL.length) * 100);

  // Show result after short delay
  setTimeout(() => showResult(correct, wrong, pct), 600);
}

function showResult(correct, wrong, pct) {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('submit-bar').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  window.scrollTo(0, 0);

  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-pct').textContent = pct + '%';

  // Score animation
  let cur = 0;
  const target = pct;
  const interval = setInterval(() => {
    cur = Math.min(cur + 2, target);
    document.getElementById('score-num').textContent = cur;
    if (cur >= target) clearInterval(interval);
  }, 20);

  // Ring animation
  const ring = document.getElementById('ring-fg');
  const circumference = 502;
  const offset = circumference - (pct / 100) * circumference;
  let ringColor = '#1A56DB';
  if (pct >= 90) ringColor = '#059669';
  else if (pct >= 77) ringColor = '#1A56DB';
  else if (pct >= 60) ringColor = '#F59E0B';
  else ringColor = '#DC2626';
  ring.style.stroke = ringColor;
  setTimeout(() => { ring.style.strokeDashoffset = offset; }, 100);

  // Grade
  let grade, desc, gradeColor;
  if (pct >= 90) {
    grade = '🏆 Sangat Siap'; desc = 'Luar biasa! Anda sangat memahami Manual Kerja SME CRR. Layak lulus karyawan tetap BCA.'; gradeColor = '#059669';
  } else if (pct >= 77) {
    grade = '✅ Siap'; desc = 'Bagus! Pemahaman Anda cukup baik. Review beberapa topik untuk hasil sempurna.'; gradeColor = '#1A56DB';
  } else if (pct >= 60) {
    grade = '📚 Cukup'; desc = 'Anda sudah memahami dasar-dasarnya. Perlu belajar lebih intensif di bagian yang masih lemah.'; gradeColor = '#F59E0B';
  } else {
    grade = '🔁 Belum Siap'; desc = 'Masih perlu banyak belajar. Review ulang seluruh manual kerja dan coba lagi.'; gradeColor = '#DC2626';
  }

  const gradeEl = document.getElementById('result-grade');
  gradeEl.textContent = grade;
  gradeEl.style.color = gradeColor;
  document.getElementById('result-desc').textContent = desc;

  // Detail rows
  const rowsEl = document.getElementById('result-rows');
  rowsEl.innerHTML = SOAL.map((s, i) => {
    const isCorrect = userAnswers[i] === s.ans;
    const shortQ = s.q.length > 70 ? s.q.substring(0, 70) + '…' : s.q;
    return `
      <div class="result-row">
        <span class="result-row-num">${s.no}</span>
        <span class="result-row-q">${shortQ}</span>
        <span class="result-row-badge ${isCorrect ? 'badge-correct' : 'badge-wrong'}">
          ${isCorrect ? '✓ Benar' : '✗ Salah'}
        </span>
      </div>
    `;
  }).join('');
}

function retryQuiz() {
  submitted = false;
  userAnswers = new Array(SOAL.length).fill(null);
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('submit-bar').style.display = 'block';
  window.scrollTo(0, 0);
  renderQuiz();
  updateProgress();
