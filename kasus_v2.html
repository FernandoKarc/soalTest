<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ujian Kasus SME CRR – BCA v2</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B1F3A; --navy2: #132d54; --blue: #1A56DB; --blue-light: #3B82F6;
    --gold: #D4A017; --gold-light: #F5C842; --cream: #FAF7F2; --white: #FFFFFF;
    --gray: #64748B; --gray-light: #E8EDF4; --green: #059669; --green-light: #D1FAE5;
    --red: #DC2626; --red-light: #FEE2E2;
    --shadow: 0 4px 24px rgba(11,31,58,0.12); --shadow-lg: 0 12px 48px rgba(11,31,58,0.18);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--navy); min-height: 100vh; }

  header { background: var(--navy); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.3); }
  .header-inner { max-width: 900px; margin: 0 auto; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .header-logo { width: 36px; height: 36px; background: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-weight: 900; font-size: 18px; color: var(--navy); flex-shrink: 0; }
  .header-title { font-weight: 600; font-size: 14px; color: var(--white); line-height: 1.3; }
  .header-title span { display: block; font-weight: 300; font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 0.05em; text-transform: uppercase; }
  .progress-wrap { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .progress-text { font-family: 'DM Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.6); white-space: nowrap; }
  .progress-bar-outer { width: 120px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 99px; overflow: hidden; }
  .progress-bar-inner { height: 100%; background: var(--gold); border-radius: 99px; transition: width 0.4s ease; width: 0%; }

  #start-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--navy); position: relative; overflow: hidden; }
  #start-screen::before { content: ''; position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(26,86,219,0.2) 0%, transparent 70%); top: -100px; right: -100px; pointer-events: none; }
  #start-screen::after { content: ''; position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(212,160,23,0.1) 0%, transparent 70%); bottom: -50px; left: -50px; pointer-events: none; }
  .start-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 56px 48px; max-width: 560px; width: 90%; text-align: center; position: relative; z-index: 1; backdrop-filter: blur(12px); }
  .start-badge { display: inline-block; background: rgba(212,160,23,0.15); border: 1px solid rgba(212,160,23,0.3); color: var(--gold-light); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 6px 16px; border-radius: 99px; margin-bottom: 24px; }
  .start-title { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 900; color: var(--white); line-height: 1.1; margin-bottom: 8px; }
  .start-title span { color: var(--gold); }
  .start-subtitle { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 36px; line-height: 1.6; }
  .start-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden; margin-bottom: 36px; }
  .start-stat { background: rgba(255,255,255,0.04); padding: 16px 12px; text-align: center; }
  .start-stat-num { font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 500; color: var(--gold); display: block; }
  .start-stat-label { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
  .btn-start { background: var(--gold); color: var(--navy); border: none; padding: 16px 48px; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em; width: 100%; }
  .btn-start:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(212,160,23,0.35); }

  #quiz-screen { display: none; padding: 32px 24px 120px; }
  .quiz-inner { max-width: 780px; margin: 0 auto; }

  .section-divider { display: flex; align-items: center; gap: 12px; margin: 40px 0 20px; }
  .section-divider:first-child { margin-top: 0; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue); white-space: nowrap; background: #EBF3FB; padding: 5px 14px; border-radius: 99px; }
  .section-line { flex: 1; height: 1px; background: var(--gray-light); }

  .question-card { background: var(--white); border-radius: 16px; padding: 28px 32px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1.5px solid transparent; transition: border-color 0.2s, box-shadow 0.2s; position: relative; animation: fadeUp 0.35s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .question-card:hover { box-shadow: var(--shadow-lg); }

  .q-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px; }
  .q-number { background: var(--navy); color: var(--gold); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 6px; flex-shrink: 0; margin-top: 2px; }
  .q-text { font-size: 15px; font-weight: 500; line-height: 1.65; color: var(--navy); }

  .options { display: flex; flex-direction: column; gap: 8px; }
  .option { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border-radius: 10px; border: 1.5px solid var(--gray-light); cursor: pointer; transition: all 0.15s; background: #FAFBFD; }
  .option:hover { border-color: var(--blue-light); background: #F0F6FF; }
  .option input[type="radio"] { display: none; }
  .option-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #CBD5E1; flex-shrink: 0; margin-top: 1px; transition: all 0.15s; position: relative; }
  .option-dot::after { content: ''; position: absolute; width: 8px; height: 8px; background: var(--blue); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0); transition: transform 0.15s; }
  .option.selected .option-dot { border-color: var(--blue); background: var(--blue); }
  .option.selected .option-dot::after { background: white; transform: translate(-50%,-50%) scale(1); }
  .option.selected { border-color: var(--blue); background: #EBF3FF; }
  .option-text { font-size: 14px; line-height: 1.5; color: #374151; }

  .option.correct { border-color: var(--green) !important; background: var(--green-light) !important; }
  .option.correct .option-dot { border-color: var(--green); background: var(--green); }
  .option.correct .option-dot::after { content: '✓'; font-size: 9px; font-weight: 700; color: white; background: transparent; transform: translate(-50%,-50%) scale(1); }
  .option.wrong { border-color: var(--red) !important; background: var(--red-light) !important; }
  .option.wrong .option-dot { border-color: var(--red); background: var(--red); }
  .option.wrong .option-dot::after { content: '✗'; font-size: 9px; font-weight: 700; color: white; background: transparent; transform: translate(-50%,-50%) scale(1); }
  .option.correct .option-text { color: #065F46; font-weight: 500; }
  .option.wrong .option-text { color: #991B1B; }
  .option.disabled { cursor: not-allowed; pointer-events: none; }

  /* Explanation box */
  .explanation-box { margin-top: 16px; border-radius: 10px; overflow: hidden; border: 1.5px solid var(--gray-light); display: none; animation: slideDown 0.3s ease; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .explanation-box.show { display: block; }
  .exp-header { display: flex; align-items: center; gap: 10px; padding: 10px 16px; font-size: 12px; font-weight: 600; }
  .exp-header.benar { background: #ECFDF5; color: #065F46; border-bottom: 1px solid #A7F3D0; }
  .exp-header.salah { background: #FFF5F5; color: #9B1C1C; border-bottom: 1px solid #FECACA; }
  .exp-icon { font-size: 14px; }
  .exp-ref { font-family: 'DM Mono', monospace; font-size: 10px; background: rgba(0,0,0,0.06); padding: 2px 7px; border-radius: 4px; margin-left: auto; }
  .exp-body { padding: 14px 16px; font-size: 13.5px; line-height: 1.7; color: #374151; background: #FAFBFD; }
  .exp-body strong { color: var(--navy); }

  .question-card.unanswered-warn { border-color: #F59E0B !important; box-shadow: 0 0 0 3px rgba(245,158,11,0.15); animation: shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  .warn-label { position: absolute; top: 12px; right: 14px; background: #FEF3C7; color: #92400E; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 10px; border-radius: 99px; border: 1px solid #FCD34D; }

  .submit-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-top: 1px solid var(--gray-light); padding: 16px 24px; display: none; z-index: 50; box-shadow: 0 -4px 24px rgba(0,0,0,0.08); }
  .submit-bar-inner { max-width: 780px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .submit-info { font-size: 13px; color: var(--gray); }
  .submit-info strong { color: var(--navy); font-weight: 600; }
  .btn-submit { background: var(--navy); color: var(--white); border: none; padding: 13px 36px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .btn-submit:hover { background: var(--navy2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(11,31,58,0.25); }

  /* Score banner */
  .score-banner { display: none; background: var(--navy); border-radius: 16px; padding: 28px 32px; margin-bottom: 32px; position: relative; overflow: hidden; }
  .score-banner::before { content: ''; position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(26,86,219,0.25) 0%, transparent 70%); top: -80px; right: -80px; pointer-events: none; }
  .score-banner-inner { display: flex; align-items: center; gap: 28px; position: relative; z-index: 1; }
  .score-ring { width: 100px; height: 100px; position: relative; flex-shrink: 0; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 10; }
  .score-ring-fg { fill: none; stroke-width: 10; stroke-linecap: round; stroke-dasharray: 283; stroke-dashoffset: 283; transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1); }
  .score-ring-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .score-ring-num { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; color: var(--white); display: block; line-height: 1; }
  .score-ring-of { font-size: 10px; color: rgba(255,255,255,0.4); }
  .score-info { flex: 1; }
  .score-grade { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
  .score-desc { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.6; margin-bottom: 14px; }
  .score-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .score-pill { font-family: 'DM Mono', monospace; font-size: 11px; padding: 5px 12px; border-radius: 99px; font-weight: 500; }
  .pill-benar { background: rgba(5,150,105,0.2); color: #6EE7B7; border: 1px solid rgba(5,150,105,0.3); }
  .pill-salah { background: rgba(220,38,38,0.2); color: #FCA5A5; border: 1px solid rgba(220,38,38,0.3); }
  .pill-pct { background: rgba(212,160,23,0.2); color: var(--gold-light); border: 1px solid rgba(212,160,23,0.3); }
  .btn-retry-inline { background: rgba(255,255,255,0.1); color: var(--white); border: 1px solid rgba(255,255,255,0.2); padding: 9px 22px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 14px; display: inline-block; }
  .btn-retry-inline:hover { background: rgba(255,255,255,0.18); }

  .question-card.result-benar { border-color: #A7F3D0; }
  .question-card.result-salah { border-color: #FECACA; }
  .q-result-tag { position: absolute; top: 12px; right: 14px; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 10px; border-radius: 99px; }
  .q-result-tag.benar { background: #D1FAE5; color: #065F46; border: 1px solid #6EE7B7; }
  .q-result-tag.salah { background: #FEE2E2; color: #991B1B; border: 1px solid #FCA5A5; }

  @media (max-width: 600px) {
    .start-card { padding: 36px 24px; } .start-title { font-size: 32px; }
    .question-card { padding: 20px 18px; } .header-inner { padding: 12px 16px; }
    .progress-bar-outer { width: 80px; } .score-banner-inner { flex-direction: column; align-items: flex-start; gap: 16px; }
  }
</style>
</head>
<body>

<header id="main-header" style="display:none;">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-logo">B</div>
      <div class="header-title">Ujian Kasus SME CRR<span>Manual Kerja Versi 21 · 2025</span></div>
    </div>
    <div class="progress-wrap">
      <span class="progress-text" id="prog-text">0 / 30</span>
      <div class="progress-bar-outer"><div class="progress-bar-inner" id="prog-bar"></div></div>
    </div>
  </div>
</header>

<div id="start-screen">
  <div class="start-card">
    <div class="start-badge">Bank Central Asia</div>
    <div class="start-title">Ujian <span>Kasus</span><br>SME CRR</div>
    <div class="start-subtitle">Tes pemahaman Manual Kerja SME ≤ Rp 15 M<br>Credit Risk Rating Versi 21 · Januari 2025</div>
    <div class="start-stats">
      <div class="start-stat"><span class="start-stat-num">30</span><div class="start-stat-label">Soal</div></div>
      <div class="start-stat"><span class="start-stat-num">8</span><div class="start-stat-label">Bagian</div></div>
      <div class="start-stat"><span class="start-stat-num">Advanced</span><div class="start-stat-label">Level</div></div>
    </div>
    <button class="btn-start" onclick="startQuiz()">Mulai Ujian →</button>
  </div>
</div>

<div id="quiz-screen">
  <div class="quiz-inner" id="quiz-container"></div>
</div>

<div class="submit-bar" id="submit-bar">
  <div class="submit-bar-inner">
    <div class="submit-info">Terjawab: <strong id="answered-count">0</strong> dari <strong>30</strong> soal</div>
    <button class="btn-submit" onclick="submitQuiz()">Submit & Lihat Nilai →</button>
  </div>
</div>

<script>
const SOAL = [
  // ── BAGIAN 1 ──
  { section:"Bagian 1 – Jenis Memo Kredit & Prosedur", no:1, ans:1, ref:"hal. 7",
    q:"PT ABADI JAYA saat ini memiliki fasilitas Kredit Lokal Rp 2 M yang akan jatuh tempo, sekaligus ingin menambah Time Loan baru Rp 1 M, dan juga ingin menukar agunan lama dengan agunan baru. Jenis Memo Kredit apa yang harus dipilih PIC Relationship?",
    opts:["A. Perpanjangan, karena perpanjangan adalah permohonan utama","B. Penambahan, karena penambahan risikonya lebih tinggi dari perpanjangan","C. Penukaran, karena penukaran agunan adalah fokus permohonan","D. Lain-lain, karena ada lebih dari satu jenis permohonan"],
    exp:"Bila permohonan lebih dari satu, dipilih yang <strong>lebih berisiko atau fokus utama</strong>. Di antara Perpanjangan, Penambahan, dan Penukaran, <strong>Penambahan</strong> memiliki risiko lebih tinggi karena ada fasilitas/plafon baru yang belum pernah ada sebelumnya." },
  { section:null, no:2, ans:2, ref:"hal. 14",
    q:"Debitur mengajukan permohonan kredit BARU dengan fasilitas revolving (jangka pendek). Tanggal memo sekarang 15 Februari 2025, jangka waktu kredit 1 tahun. Kapan batas MAKSIMAL jatuh tempo yang boleh diinput?",
    opts:["A. 14 Februari 2026","B. 15 Februari 2026","C. 14 Juni 2026","D. 15 Juni 2026"],
    exp:"Untuk fasilitas <strong>baru jangka pendek (revolving)</strong>: Tanggal Memo Sekarang + Jangka Waktu Kredit + <strong>maksimal 4 bulan – 1 hari</strong>. Perhitungan: 15 Feb 2025 + 1 tahun + 4 bulan – 1 hari = <strong>14 Juni 2026</strong>." },
  { section:null, no:3, ans:1, ref:"hal. 4",
    q:"Hasil scoring sistem menunjukkan 'Grey'. Siapa yang berhak memberikan KEPUTUSAN kredit?",
    opts:["A. Senior Officer SME & UMKM Loan Processing (SUC) dan Kepala KCU saja","B. Senior Credit Analyst / Credit Adviser dan Kepala KCU / Kakanwil","C. PIC Relationship dan Head Relationship Officer","D. Kakanwil saja tanpa persetujuan Credit Analyst"],
    exp:"Jika hasil <strong>Grey</strong>, keputusan diberikan oleh <strong>Senior Credit Analyst / Credit Adviser</strong> dan <strong>Kepala KCU / Kepala SME & UMKM Loan Processing (SUC) dan/atau Kakanwil</strong>. Grey berarti analisa lebih lanjut diperlukan dan dikirim ke Grup Analisa Risiko Kredit." },

  // ── BAGIAN 2 ──
  { section:"Bagian 2 – Data Debitur & Eksposur", no:4, ans:2, ref:"hal. 25",
    q:"Debitur A (fasilitas Rp 6 M) dan Debitur B (fasilitas Rp 4 M) dijamin dengan 1 agunan T/B Ruko: Nilai Pasar Rp 20 M, Nilai Taksasi Rp 15 M, Nilai Pengikatan Rp 12 M. Berapa Nilai Pengikatan yang dimasukkan di Collateral Sheet Debitur B?",
    opts:["A. Rp 12.000.000.000","B. Rp 7.200.000.000","C. Rp 4.800.000.000","D. Rp 6.000.000.000"],
    exp:"Porsi Debitur B = 4 M / (6 M + 4 M) = <strong>40%</strong>. Nilai Pengikatan Debitur B = 40% × Rp 12 M = <strong>Rp 4.800.000.000</strong>. Nilai Pasar agunan tetap ditulis penuh Rp 20 M di kedua debitur, namun Nilai Agunan Dijaminkan, Nilai Taksasi, dan Nilai Pengikatan dibagi proporsional." },
  { section:null, no:5, ans:2, ref:"hal. 26",
    q:"Debitur memiliki fasilitas KPR BCA dengan outstanding Rp 600 juta yang dijamin saling ikat dengan agunan T/B rumah tinggal Nilai Pasar Rp 4 M. Berapa Nilai Agunan Yang Dijaminkan untuk fasilitas kredit produktif SME?",
    opts:["A. Rp 4.000.000.000","B. Rp 3.400.000.000","C. Rp 2.800.000.000","D. Rp 3.000.000.000"],
    exp:"Coverage KPR = LTV 50% → NP agunan untuk KPR = OS KPR / 50% = Rp 600 juta / 50% = <strong>Rp 1.200 juta</strong>. Sisa untuk kredit SME = Rp 4.000 juta – Rp 1.200 juta = <strong>Rp 2.800.000.000</strong>." },
  { section:null, no:6, ans:2, ref:"hal. 60",
    q:"Debitur perorangan dengan status menikah mengajukan kredit. Agunan berupa T/B atas nama istri debitur. Pasangan (suami) debitur tidak bersedia menandatangani pengikatan agunan maupun surat pernyataan persetujuan. Field 'Persetujuan dari Suami/Istri' diisi?",
    opts:["A. Ada","B. Tidak Diperlukan","C. Tidak Ada","D. Cukup Lengkap"],
    exp:"Dipilih <strong>'Tidak Ada'</strong> karena pemilik agunan (istri) sudah menikah secara sah dan pasangannya (suami) <strong>tidak bersedia</strong> menandatangani pengikatan agunan maupun memberikan surat pernyataan persetujuan. 'Tidak Diperlukan' hanya jika status belum menikah, cerai, pasangan meninggal, atau ada perjanjian pisah harta." },
  { section:null, no:7, ans:1, ref:"hal. 16",
    q:"Debitur suami-istri tidak pisah harta, masing-masing memiliki usaha berbeda namun NPWP sama. Bagaimana perlakuan data keuangan keduanya di ICOS SME?",
    opts:["A. Data keuangan diisi terpisah karena usaha berbeda","B. Data keuangan saat ini dan proyeksi digabungkan karena terkait KUU","C. Data keuangan digabungkan hanya untuk proyeksi saja","D. Data keuangan mengikuti debitur utama saja"],
    exp:"Suami-istri tidak pisah harta (bullet 3) dan NPWP sama (bullet 4) adalah dua kondisi KUU. Untuk KUU karena kondisi ini, field <strong>'Usaha Sama dgn Debitur' wajib diisi 'Ya'</strong> dan <strong>data keuangan saat ini DAN proyeksi digabungkan</strong>." },

  // ── BAGIAN 3 ──
  { section:"Bagian 3 – Rincian Agunan", no:8, ans:1, ref:"hal. 5–6",
    q:"PT ABC mengajukan KI pembiayaan mesin non-kendaraan tenor 5 tahun Rp 3 M. Agunan: T/B Rp 3 M (NP), Mesin Baru Rp 1,5 M (NP). Apakah syarat agunan kredit umum terpenuhi?",
    opts:["A. Ya, karena total agunan sudah 150% dari plafon","B. Tidak, karena Nilai Pasar Mesin melebihi batas 25% dari plafon KI","C. Ya, karena solid sudah 100% dan mesin di bawah 50%","D. Tidak, karena solid harus minimal 100% untuk semua KI mesin"],
    exp:"Untuk KI mesin <strong>>3 s/d 7 tahun</strong>: Solid ≥ 75% DAN Mesin <strong>≤ 25%</strong> dari plafon. 25% × Rp 3 M = Rp 750 juta. NP Mesin = Rp 1,5 M = <strong>50% dari plafon — MELEBIHI batas 25%</strong>. Nilai agunan mesin yang dijaminkan harus di-adjust maksimal Rp 750 juta." },
  { section:null, no:9, ans:2, ref:"hal. 20",

let userAnswers = new Array(SOAL.length).fill(null);
let submitted = false;

function startQuiz() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('submit-bar').style.display = 'block';
  document.getElementById('main-header').style.display = 'block';
  renderQuiz();
  updateProgress();
}

function renderQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  let currentSection = null;
  SOAL.forEach((s, idx) => {
    if (s.section && s.section !== currentSection) {
      currentSection = s.section;
      const div = document.createElement('div');
      div.className = 'section-divider';
      div.innerHTML = `<span class="section-label">${s.section}</span><div class="section-line"></div>`;
      container.appendChild(div);
    }
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${idx}`;
    card.style.animationDelay = `${(idx % 5) * 0.06}s`;
    const optsHtml = s.opts.map((o, oi) => `
      <label class="option" id="opt-${idx}-${oi}" onclick="selectAnswer(${idx}, ${oi})">
        <input type="radio" name="q${idx}" value="${oi}">
        <div class="option-dot"></div>
        <span class="option-text">${o}</span>
      </label>`).join('');
    card.innerHTML = `
      <div class="q-header">
        <span class="q-number">No.${s.no}</span>
        <span class="q-text">${s.q}</span>
      </div>
      <div class="options">${optsHtml}</div>
      <div class="explanation-box" id="exp-${idx}">
        <div class="exp-header" id="exp-header-${idx}">
          <span class="exp-icon" id="exp-icon-${idx}"></span>
          <span id="exp-title-${idx}"></span>
          <span class="exp-ref">${s.ref}</span>
        </div>
        <div class="exp-body">${s.exp}</div>
      </div>`;
    container.appendChild(card);
  });
}

function selectAnswer(qIdx, optIdx) {
  if (submitted) return;
  userAnswers[qIdx] = optIdx;
  SOAL[qIdx].opts.forEach((_, oi) => {
    document.getElementById(`opt-${qIdx}-${oi}`).classList.toggle('selected', oi === optIdx);
  });
  const card = document.getElementById(`card-${qIdx}`);
  card.classList.remove('unanswered-warn');
  const warn = card.querySelector('.warn-label');
  if (warn) warn.remove();
  updateProgress();
}

function updateProgress() {
  const answered = userAnswers.filter(a => a !== null).length;
  document.getElementById('answered-count').textContent = answered;
  document.getElementById('prog-text').textContent = `${answered} / ${SOAL.length}`;
  document.getElementById('prog-bar').style.width = `${(answered / SOAL.length) * 100}%`;
}

function submitQuiz() {
  const unanswered = userAnswers.map((a, i) => a === null ? i : null).filter(i => i !== null);
  if (unanswered.length > 0) {
    unanswered.forEach(idx => {
      const card = document.getElementById(`card-${idx}`);
      card.classList.add('unanswered-warn');
      if (!card.querySelector('.warn-label')) {
        const lbl = document.createElement('span');
        lbl.className = 'warn-label';
        lbl.textContent = '⚠ Belum dijawab';
        card.appendChild(lbl);
      }
    });
    document.getElementById(`card-${unanswered[0]}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  submitted = true;

  SOAL.forEach((s, idx) => {
    const isCorrect = userAnswers[idx] === s.ans;
    const card = document.getElementById(`card-${idx}`);
    s.opts.forEach((_, oi) => {
      const el = document.getElementById(`opt-${idx}-${oi}`);
      el.classList.add('disabled');
      el.classList.remove('selected');
      if (oi === s.ans) el.classList.add('correct');
      else if (oi === userAnswers[idx] && userAnswers[idx] !== s.ans) el.classList.add('wrong');
    });
    card.classList.add(isCorrect ? 'result-benar' : 'result-salah');
    const tag = document.createElement('span');
    tag.className = `q-result-tag ${isCorrect ? 'benar' : 'salah'}`;
    tag.textContent = isCorrect ? '✓ Benar' : '✗ Salah';
    card.appendChild(tag);
    const expBox = document.getElementById(`exp-${idx}`);
    const expHeader = document.getElementById(`exp-header-${idx}`);
    const expIcon = document.getElementById(`exp-icon-${idx}`);
    const expTitle = document.getElementById(`exp-title-${idx}`);
    expBox.classList.add('show');
    expHeader.classList.add(isCorrect ? 'benar' : 'salah');
    expIcon.textContent = isCorrect ? '✓' : '✗';
    expTitle.textContent = isCorrect ? 'Jawaban Anda Benar!' : `Jawaban Benar: ${s.opts[s.ans]}`;
  });

  const correct = userAnswers.filter((a, i) => a === SOAL[i].ans).length;
  const wrong = SOAL.length - correct;
  const pct = Math.round((correct / SOAL.length) * 100);
  showScoreBanner(correct, wrong, pct);
}

function showScoreBanner(correct, wrong, pct) {
  const container = document.getElementById('quiz-container');
  const banner = document.createElement('div');
  banner.className = 'score-banner';
  banner.id = 'score-banner';
  let grade, desc;
  if (pct >= 90) { grade = '🏆 Sangat Siap'; desc = 'Luar biasa! Pemahaman Anda sangat kuat. Layak lulus karyawan tetap BCA.'; }
  else if (pct >= 77) { grade = '✅ Siap'; desc = 'Bagus! Pemahaman Anda cukup baik. Review beberapa topik untuk hasil sempurna.'; }
  else if (pct >= 60) { grade = '📚 Cukup'; desc = 'Perlu belajar lebih intensif di bagian yang masih lemah.'; }
  else { grade = '🔁 Belum Siap'; desc = 'Perlu review ulang seluruh manual kerja dan coba lagi.'; }
  const ringColor = pct >= 90 ? '#059669' : pct >= 77 ? '#1A56DB' : pct >= 60 ? '#F59E0B' : '#DC2626';
  const circ = 283;
  const offset = circ - (pct / 100) * circ;
  banner.innerHTML = `
    <div class="score-banner-inner">
      <div class="score-ring">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle class="score-ring-bg" cx="50" cy="50" r="45"/>
          <circle class="score-ring-fg" id="sring" cx="50" cy="50" r="45" style="stroke:${ringColor}"/>
        </svg>
        <div class="score-ring-text">
          <span class="score-ring-num" id="snum">0</span>
          <span class="score-ring-of">/ 100</span>
        </div>
      </div>
      <div class="score-info">
        <div class="score-grade">${grade}</div>
        <div class="score-desc">${desc}</div>
        <div class="score-pills">
          <span class="score-pill pill-benar">✓ ${correct} Benar</span>
          <span class="score-pill pill-salah">✗ ${wrong} Salah</span>
          <span class="score-pill pill-pct">${pct}% Akurasi</span>
        </div>
        <button class="btn-retry-inline" onclick="retryQuiz()">↺ Ulangi Ujian</button>
      </div>
    </div>`;
  container.insertBefore(banner, container.firstChild);
  banner.style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  let cur = 0;
  const iv = setInterval(() => {
    cur = Math.min(cur + 2, pct);
    document.getElementById('snum').textContent = cur;
    if (cur >= pct) clearInterval(iv);
  }, 20);
  setTimeout(() => {
    const el = document.getElementById('sring');
    if (el) el.style.strokeDashoffset = offset;
  }, 200);

  document.getElementById('submit-bar').innerHTML = `
    <div class="submit-bar-inner">
      <div class="submit-info">Nilai: <strong>${pct}/100</strong> &nbsp;·&nbsp; Benar: <strong style="color:#059669">${correct}</strong> &nbsp;·&nbsp; Salah: <strong style="color:#DC2626">${wrong}</strong></div>
      <button class="btn-submit" onclick="retryQuiz()">↺ Ulangi Ujian</button>
    </div>`;
}

function retryQuiz() {
  submitted = false;
  userAnswers = new Array(SOAL.length).fill(null);
  renderQuiz();
  updateProgress();
  document.getElementById('submit-bar').innerHTML = `
    <div class="submit-bar-inner">
      <div class="submit-info">Terjawab: <strong id="answered-count">0</strong> dari <strong>30</strong> soal</div>
      <button class="btn-submit" onclick="submitQuiz()">Submit & Lihat Nilai →</button>
    </div>`;
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
